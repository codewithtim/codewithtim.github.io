<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeWithTim</title>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans|Roboto' rel='stylesheet' type='text/css'>
  <style>
  body * {
    font-family: 'Roboto', 'Open Sans', sans-serif;
  }
  .flexcontainer {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
  }
  .header, .header h1 {
    width: 100%;
  }

  .header h1 {
    font-weight: bold;
    font-size: 40px;
  }

  h2, label, .header h1  {
    font-weight: bold;
  }

  .header h1, form, .button {
    color: #4A9DF9 !important;
  }

  form {
    width: 350px;
    padding: 50px 0 0 0  !important;
    -webkit-background-origin: 5px;
  }

  input, input:active, input:focus {
    border: none !important;
    border-radius: 0 !important;
    border-bottom: 2px solid #4A9DF9 !important;
    outline: none !important;
  }

  input.email, input#mce-FNAME, .mce_inline_error, input:-webkit-autofill, textarea:-webkit-autofill, select:-webkit-autofill {
    background: #fff !important;
  }

  input {
    font-size: 15px;
  }

  input, input.email, input#mce-FNAME, .mce_inline_error, .flexcontainer h2 {
    color:  #7c8a96 !important;
  }

  label, .button {
    font-size: 18px !important;
  }
  #mc_embed_signup #mce-success-response, #mce-success-response {

  }


  #mc_embed_signup h2 {
    margin: 0 0 30px 0 !important;
  }

  .button {
    border: 1px solid #4A9DF9 !important;
    border-radius: 2px !important;
    background: #fff !important;
    margin-top: 20px !important;
  }

  .button:hover, .button:active, .button:focus {
    color: white !important;
    background: #4A9DF9 !important;
    border-radius: 2px !important;
  }
  .clear, .flexcontainer h2, .header h1 {
    text-align: center;
  }
  .mc-field-group label {
    margin: 20px 0 0 0 !important;
  }
  #mc_embed_signup #mc-embedded-subscribe-form div.mce_inline_error {
    margin: 0 !important;
  }
  #mc_embed_signup #mce-success-response, #mce-responses {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
  }
  </style>
</head>
<body>

  <!-- Begin MailChimp Signup Form -->
  <link href="//cdn-images.mailchimp.com/embedcode/classic-10_7.css" rel="stylesheet" type="text/css">
  <style type="text/css">
  	#mc_embed_signup{clear:left; font:14px Helvetica,Arial,sans-serif; }
  	/* Add your own MailChimp form style overrides in your site stylesheet or in this style block.
  	   We recommend moving this block and the preceding CSS link to the HEAD of your HTML file. */
  </style>
  <div id="mc_embed_signup" class="flexcontainer">
    <div class="header">
      <h1>Code With Tim</h1>
      <h2>Coming Soon!</h2>
    </div>
    <form action="https://codewithtim.us13.list-manage.com/subscribe/post?u=8fb4d9aa219095246b925e4fc&amp;id=f5a6c2f60d" method="post" id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" class="validate" target="_blank" novalidate>
        <div id="mc_embed_signup_scroll">
    	<h2>Subscribe for updates</h2>
    <div class="mc-field-group">
    	<label for="mce-EMAIL">Email Address
    </label>
    	<input type="email" value="" name="EMAIL" class="required email" id="mce-EMAIL">
    </div>
    <div class="mc-field-group">
    	<label for="mce-FNAME">Name
    </label>
    	<input type="text" value="" name="FNAME" class="required" id="mce-FNAME">
    </div>
    	<div id="mce-responses" class="clear">
    		<div class="response" id="mce-error-response" style="display:none"></div>
    		<div class="response" id="mce-success-response" style="display:none"></div>
    	</div>    <!-- real people should not fill this in and expect good things - do not remove this or risk form bot signups-->
        <div style="position: absolute; left: -5000px;" aria-hidden="true"><input type="text" name="b_8fb4d9aa219095246b925e4fc_f5a6c2f60d" tabindex="-1" value=""></div>
        <div class="clear"><input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe" class="button"></div>
        </div>
    </form>
  </div>
  <script type='text/javascript' src='https://s3.amazonaws.com/downloads.mailchimp.com/js/mc-validate.js'></script><script type='text/javascript'>(function($) {window.fnames = new Array(); window.ftypes = new Array();fnames[0]='EMAIL';ftypes[0]='email';fnames[1]='FNAME';ftypes[1]='text';fnames[2]='LNAME';ftypes[2]='text';}(jQuery));var $mcj = jQuery.noConflict(true);</script>
  <!--End mc_embed_signup-->
  
</body>
</html>
